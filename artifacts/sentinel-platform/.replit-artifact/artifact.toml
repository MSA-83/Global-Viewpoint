kind = "web"
previewPath = "/"
title = "Sentinel — Global Situational Awareness"
version = "1.0.0"
id = "artifacts/sentinel-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25008

[services.development]
run = "pnpm --filter @workspace/sentinel-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sentinel-platform", "run", "build" ]
publicDir = "artifacts/sentinel-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25008"
BASE_PATH = "/"
